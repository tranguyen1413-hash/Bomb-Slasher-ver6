<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chém Bom Né Quả - Sấm Sét Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        // Firebase Setup & Logic (BẢNG XẾP HẠNG TOÀN CẦU)
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        let db, auth, user;

        const firebaseConfig = {
            apiKey: "AIzaSyCwKx_btF8EvR5Xp0sM2pi_VT6wWQdF4ec",
            authDomain: "chem-bom-game.firebaseapp.com",
            projectId: "chem-bom-game",
            storageBucket: "chem-bom-game.firebasestorage.app",
            messagingSenderId: "521625372789",
            appId: "1:521625372789:web:d583224c097c779cab103c"
        };

        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            signInAnonymously(auth).catch((error) => {
                console.error("Lỗi đăng nhập Firebase:", error);
            });

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    loadGlobalLeaderboard();
                }
            });
        } catch (error) {
            console.error("Firebase init failed:", error);
        }

        // --- Leaderboard Logic ---
        let topScores = [];
        window.isSubmittingScore = false;

        function loadGlobalLeaderboard() {
            if (!user || !db) return;
            const lbRef = collection(db, 'leaderboard');
            onSnapshot(lbRef, (snapshot) => {
                let scores = [];
                snapshot.forEach(doc => { scores.push({ id: doc.id, ...doc.data() }); });
                scores.sort((a, b) => b.score - a.score);
                topScores = scores.slice(0, 5);
                renderLeaderboard();
            }, (error) => {
                const errorMsg = '<li class="text-gray-400 text-sm">Không tải được dữ liệu bảng vàng</li>';
                document.getElementById('leaderboardList').innerHTML = errorMsg;
                document.getElementById('gameOverLeaderboardList').innerHTML = errorMsg;
            });
        }

        function renderLeaderboard() {
            const listStart = document.getElementById('leaderboardList');
            const listGameOver = document.getElementById('gameOverLeaderboardList');
            
            if (topScores.length === 0) {
                const emptyMsg = '<li class="text-gray-400 text-sm text-center py-2">Chưa có ai chơi! Hãy là người đầu tiên.</li>';
                if(listStart) listStart.innerHTML = emptyMsg;
                if(listGameOver) listGameOver.innerHTML = emptyMsg;
                return;
            }
            
            const htmlContent = topScores.map((s, index) => {
                let badge = index === 0 ? '👑' : index === 1 ? '🥈' : index === 2 ? '🥉' : '';
                return `<li class="flex justify-between items-center py-2 border-b border-gray-700 last:border-0">
                            <span class="text-gray-300 flex items-center gap-2">
                                <span class="w-6 inline-block text-center">${badge || (index+1)}</span> 
                                <span class="font-semibold truncate w-24 text-left">${s.name}</span>
                            </span>
                            <span class="text-yellow-400 font-bold">${s.score}</span>
                        </li>`;
            }).join('');

            if(listStart) listStart.innerHTML = htmlContent;
            if(listGameOver) listGameOver.innerHTML = htmlContent;
        }

        window.submitScore = async function(name, score) {
            if (!user || !db || isSubmittingScore || !name.trim()) return false;
            window.isSubmittingScore = true;
            try {
                const lbRef = collection(db, 'leaderboard');
                await addDoc(lbRef, {
                    name: name.substring(0, 15),
                    score: score,
                    timestamp: new Date().getTime(),
                    userId: user.uid
                });
                return true;
            } catch (e) { return false; } finally { window.isSubmittingScore = false; }
        };
    </script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0f172a; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        #gameCanvas { display: block; width: 100%; height: 100%; box-shadow: inset 0 0 50px rgba(0,0,0,0.9); background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); }
        .ui-container { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 1.5rem; }
        .interactive { pointer-events: auto; }
        .btn { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); transition: all 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        #damageOverlay { position: absolute; inset: 0; background-color: rgba(239, 68, 68, 0.5); opacity: 0; transition: opacity 0.1s; pointer-events: none; }
        .flash-damage { animation: flash 0.4s ease-out; }
        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }
        #lightningOverlay { position: absolute; inset: 0; background-color: white; opacity: 0; pointer-events: none; }
        .flash-lightning { animation: lightningFlash 0.15s ease-out; }
        @keyframes lightningFlash { 0% { opacity: 0.8; } 50% { opacity: 0; } 75% { opacity: 0.5; } 100% { opacity: 0; } }
        .name-input { background: rgba(15, 23, 42, 0.8); border: 2px solid #3b82f6; color: white; padding: 0.75rem; border-radius: 0.5rem; width: 100%; text-align: center; font-size: 1.25rem; outline: none; }
        .name-input:focus { border-color: #60a5fa; box-shadow: 0 0 10px rgba(96, 165, 250, 0.5); }
        .glass-panel { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        .live-indicator { display: inline-block; width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        /* Custom scrollbar cho Game Over screen */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(96, 165, 250, 0.5); border-radius: 4px; }
    </style>
</head>
<body>

    <audio id="bgMusic" src="https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3" loop preload="auto"></audio>
    <div id="lightningOverlay"></div>
    <div id="damageOverlay"></div>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-container z-10" id="uiLayer">
        <div id="hud" class="flex justify-between items-start opacity-0 transition-opacity duration-300">
            <div>
                <div class="text-white font-bold text-3xl drop-shadow-md">Điểm: <span id="scoreText" class="text-yellow-400">0</span></div>
                <div class="text-gray-400 text-sm font-semibold mt-1">Kỷ lục: <span id="highScoreTextHUD" class="text-blue-300">0</span></div>
            </div>
            <div class="flex items-center gap-4">
                <button id="musicToggleBtn" class="text-2xl md:text-3xl drop-shadow-md focus:outline-none hover:scale-110 transition-transform interactive">🔊</button>
                <div class="flex gap-2" id="livesContainer"></div>
            </div>
        </div>

        <div id="screenContainer" class="flex-1 flex items-center justify-center">
            <div id="startScreen" class="bg-gray-800 bg-opacity-95 p-6 md:p-8 rounded-2xl border-2 border-blue-500 text-center shadow-[0_0_30px_rgba(59,130,246,0.3)] max-w-md w-full mx-4 flex flex-col md:flex-row gap-6 interactive">
                <div class="flex-1">
                    <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-1 drop-shadow-lg tracking-tight">CHÉM <span class="text-red-500">BOM</span></h1>
                    <h2 class="text-xl md:text-2xl font-bold text-green-400 mb-4 drop-shadow-md">SẤM SÉT EDITION</h2>
                    <div class="text-gray-300 mb-6 text-sm bg-gray-900 rounded-lg p-3 text-left">
                        <p class="mb-1">🔪 <strong>Vuốt</strong> để chém đứt 💣.</p>
                        <p class="mb-1 text-red-400">❌ Né hoa quả 🍎🍌🍉.</p>
                        <p class="text-yellow-400">⚠️ Đừng để bom rơi!</p>
                    </div>
                    <button id="startBtn" class="btn text-white font-bold py-3 px-8 rounded-full text-xl w-full uppercase tracking-wider mb-4">Chơi Ngay</button>
                    <div class="text-gray-400 text-sm font-semibold">Kỷ lục: <span id="highScoreTextStart" class="text-yellow-400 text-lg">0</span></div>
                </div>
                <div class="glass-panel p-4 rounded-xl flex-1 flex flex-col min-w-[200px]">
                    <h3 class="text-blue-400 font-bold mb-3 border-b border-blue-500/30 pb-2 flex items-center justify-center"><span class="live-indicator"></span> TOP NINJA ONLINE</h3>
                    <ul id="leaderboardList" class="flex-1 flex flex-col justify-start text-sm overflow-y-auto"><li class="text-gray-500 italic">Đang tải...</li></ul>
                </div>
            </div>

            <div id="gameOverScreen" class="hidden bg-gray-900 bg-opacity-95 p-6 md:p-8 rounded-2xl border-2 border-red-500 text-center shadow-[0_0_40px_rgba(239,68,68,0.4)] max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300 interactive flex flex-col max-h-[90vh]">
                <div class="overflow-y-auto custom-scrollbar pr-2">
                    <h1 class="text-4xl font-extrabold text-red-500 mb-2 drop-shadow-lg uppercase">Thua Rồi!</h1>
                    <p class="text-gray-300 text-lg">Điểm của bạn</p>
                    <div class="text-6xl font-black text-yellow-400 mb-2 drop-shadow-lg" id="finalScore">0</div>
                    
                    <div id="newRecordMsg" class="hidden text-green-400 font-bold animate-pulse mb-4">🎉 CHÚC MỪNG KỶ LỤC MỚI! 🎉</div>
                    
                    <div id="submitScoreForm" class="hidden mb-4">
                        <input type="text" id="playerName" class="name-input mb-3" placeholder="Nhập tên của bạn" maxlength="12">
                        <button id="submitNameBtn" class="btn text-white font-bold py-2 px-6 rounded-lg w-full">Ghi Danh Bảng Vàng</button>
                        <p id="submitStatus" class="text-xs text-gray-400 mt-2"></p>
                    </div>
                    
                    <button id="restartBtn" class="btn btn-red text-white font-bold py-3 px-8 rounded-full text-xl w-full uppercase tracking-wider mt-2 mb-6 shadow-lg">Chơi Lại</button>

                    <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-inner">
                        <h3 class="text-blue-400 font-bold mb-3 border-b border-gray-600 pb-2 text-sm uppercase flex items-center justify-center gap-2">
                            <span class="live-indicator"></span> Top Ninja Toàn Cầu
                        </h3>
                        <ul id="gameOverLeaderboardList" class="flex flex-col justify-start text-sm max-h-40 overflow-y-auto custom-scrollbar">
                            <li class="text-gray-500 italic">Đang tải...</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const screens = { container: document.getElementById('screenContainer'), start: document.getElementById('startScreen'), gameOver: document.getElementById('gameOverScreen'), hud: document.getElementById('hud') };
        const texts = { score: document.getElementById('scoreText'), finalScore: document.getElementById('finalScore'), highScoreHUD: document.getElementById('highScoreTextHUD'), highScoreStart: document.getElementById('highScoreTextStart') };
        const overlays = { damage: document.getElementById('damageOverlay'), lightning: document.getElementById('lightningOverlay') };
        const livesContainer = document.getElementById('livesContainer');
        const submitForm = document.getElementById('submitScoreForm');
        const playerNameInput = document.getElementById('playerName');
        const newRecordMsg = document.getElementById('newRecordMsg');
        const bgMusic = document.getElementById('bgMusic');
        const musicToggleBtn = document.getElementById('musicToggleBtn');
        
        let isMusicPlaying = true;
        let audioUnlocked = false; 
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function unlockAudio() {
            if(audioUnlocked) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            bgMusic.play().then(() => {
                if (state !== 'PLAY') bgMusic.pause();
            }).catch(e => console.log("Unlock audio failed:", e));
            
            audioUnlocked = true;
            document.removeEventListener('click', unlockAudio);
            document.removeEventListener('touchstart', unlockAudio);
        }
        document.addEventListener('click', unlockAudio);
        document.addEventListener('touchstart', unlockAudio);

        musicToggleBtn.addEventListener('click', () => {
            isMusicPlaying = !isMusicPlaying;
            if (isMusicPlaying) {
                musicToggleBtn.innerText = '🔊';
                if (state === 'PLAY') bgMusic.play().catch(e => console.log(e));
            } else {
                musicToggleBtn.innerText = '🔇';
                bgMusic.pause();
            }
        });
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'BOMB') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.5);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'FRUIT') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'GAMEOVER') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(50, now + 1);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 1);
                osc.start(now); osc.stop(now + 1);
            }
        }

        let state = 'START';
        let score = 0, lives = 3, frame = 0, shake = 0;
        let localHighScore = localStorage.getItem('bombNinjaHighScore') || 0;
        texts.highScoreStart.innerText = localHighScore;
        texts.highScoreHUD.innerText = localHighScore;

        let targets = [], particles = [], lightnings = [], halves = [], slicePts = [];
        let isSlicing = false;
        const FRUITS = ['🍎', '🍉', '🍌', '🍓', '🍇', '🍍', '🥥', '🥝'];
        const BOMB = '💣';

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const rnd = (min, max) => Math.random() * (max - min) + min;
        const distSq = (p1, p2) => (p1.x - p2.x)**2 + (p1.y - p2.y)**2;
        const distToSegmentSq = (p, v, w) => {
            let l2 = distSq(v, w);
            if (l2 === 0) return distSq(p, v);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return distSq(p, { x: v.x + t * (w.x - v.x), y: v.y + t * (w.y - v.y) });
        };

        class Target {
            constructor() {
                this.r = Math.min(canvas.width, canvas.height) * 0.08;
                this.x = rnd(this.r * 2, canvas.width - this.r * 2);
                this.y = canvas.height + this.r;
                this.vx = rnd(-1.5, 1.5); 
                
                let baseScale = Math.min(canvas.width, canvas.height) / 800;
                baseScale = Math.max(0.6, Math.min(baseScale, 1.2)); 
                
                // CẬP NHẬT LOGIC ĐỘ KHÓ
                let diffFactor = 1 + (score / 150); // Tăng tốc độ cơ bản theo điểm
                if (score >= 100) {
                    diffFactor += 0.8; // Tăng đột biến tốc độ rơi sau 100 điểm
                }
                
                this.baseScale = baseScale; 
                this.vy = rnd(-15, -12) * baseScale * diffFactor;
                
                // Tỉ lệ bom ép người chơi sau 100 điểm
                let bombChance = score >= 100 ? 0.85 : 0.65; // Đạt 100đ thì 85% là bom
                this.isBomb = Math.random() < bombChance;
                
                this.emoji = this.isBomb ? BOMB : FRUITS[Math.floor(Math.random() * FRUITS.length)];
                this.rot = 0;
                this.rotSpd = rnd(-0.05, 0.05);
                this.dead = false;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.22 * this.baseScale; 
                this.rot += this.rotSpd;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rot);
                ctx.font = `${this.r * 1.5}px Arial`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if(this.isBomb) {
                    ctx.shadowColor = 'rgba(239, 68, 68, 0.8)'; ctx.shadowBlur = 15;
                } else {
                    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 5;
                }
                ctx.fillText(this.emoji, 0, 0
